name: Test github_token, commit, and annotations_limit inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create JUnit XML report
        run: |
          mkdir -p junit-reports
          cat > junit-reports/TEST-token.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuite name="TokenSuite" tests="2" failures="0" errors="0" skipped="0" time="0.5">
            <testcase name="test_alpha" classname="com.example.TokenTest" time="0.3"/>
            <testcase name="test_beta" classname="com.example.TokenTest" time="0.2"/>
          </testsuite>
          EOF

      - name: Get current commit SHA
        id: get_sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - id: action
        uses: .
        with:
          github_token: ${{ github.token }}
          report_paths: '**/junit-reports/TEST-token.xml'
          annotate_only: 'true'
          fail_on_failure: 'false'
          job_summary: 'false'
          commit: ${{ steps.get_sha.outputs.sha }}
          annotations_limit: '10'
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Assert total count
        env:
          ACTUAL: ${{ steps.action.outputs.total }}
        run: |
          echo "total: $ACTUAL"
          if [ "$ACTUAL" != "2" ]; then
            echo "FAIL: expected total=2, got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"

      - name: Assert passed count
        env:
          ACTUAL: ${{ steps.action.outputs.passed }}
        run: |
          echo "passed: $ACTUAL"
          if [ "$ACTUAL" != "2" ]; then
            echo "FAIL: expected passed=2, got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
