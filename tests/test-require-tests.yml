name: Test require_tests flag
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure no junit reports exist
        run: |
          rm -rf junit-reports || true
          echo "No junit reports present"

      - id: action
        uses: .
        with:
          report_paths: '**/junit-reports/TEST-*.xml'
          require_tests: 'true'
          fail_on_failure: 'false'
          annotate_only: 'true'
          check_annotations: 'false'
          job_summary: 'false'
        continue-on-error: true

      - name: Assert action failed due to missing tests
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when require_tests=true and no tests found, got outcome='$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed when no tests found"
